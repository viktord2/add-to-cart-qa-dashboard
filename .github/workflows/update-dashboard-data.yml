name: Update Dashboard Data

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # manual trigger
  push:
    branches: [main]

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch GitHub Project Data
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api graphql -f query='
          {
            organization(login: "wix-private") {
              projectV2(number: 365) {
                items(first: 100) {
                  nodes {
                    fieldValues(first: 10) {
                      nodes {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                          field { ... on ProjectV2SingleSelectField { name } }
                        }
                      }
                    }
                    content {
                      ... on Issue {
                        number
                        title
                        url
                        repository { name }
                        labels(first: 10) { nodes { name } }
                      }
                    }
                  }
                }
              }
            }
          }' | python3 scripts/fetch-data.py > data.json

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update dashboard data [skip ci]"
          git push
