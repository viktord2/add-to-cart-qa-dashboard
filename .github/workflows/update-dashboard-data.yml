name: Update Dashboard Data

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # manual trigger
  push:
    branches: [main]

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch GitHub Project Data
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          RAW=$(gh api graphql -f query='
          {
            organization(login: "wix-private") {
              projectV2(number: 365) {
                items(first: 100) {
                  nodes {
                    fieldValues(first: 10) {
                      nodes {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                          field { ... on ProjectV2SingleSelectField { name } }
                        }
                      }
                    }
                    content {
                      ... on Issue {
                        number
                        title
                        url
                        repository { name }
                        labels(first: 10) { nodes { name } }
                      }
                    }
                  }
                }
              }
            }
          }')

          echo "DEBUG total items: $(echo "$RAW" | python3 -c "import json,sys; nodes=json.load(sys.stdin)['data']['organization']['projectV2']['items']['nodes']; print(len(nodes))")"

          echo "$RAW" | python3 -c "
import json, sys
nodes = json.load(sys.stdin)['data']['organization']['projectV2']['items']['nodes']
for item in nodes[:5]:
    c = item.get('content') or {}
    num = c.get('number', 'N/A')
    labels = [l['name'] for l in c.get('labels', {}).get('nodes', [])]
    print(f'  #{num} labels={labels}')
"

          echo "$RAW" | python3 -c "
import json, sys
raw = json.load(sys.stdin)
items = raw['data']['organization']['projectV2']['items']['nodes']
tickets = []
for item in items:
    content = item.get('content')
    if not content or 'number' not in content:
        continue
    labels = [l['name'] for l in content.get('labels', {}).get('nodes', [])]
    if not any(l.lower() == 'add to cart' for l in labels):
        continue
    status = next(
        (fv['name'] for fv in item['fieldValues']['nodes']
         if fv.get('field', {}).get('name') == 'Status'),
        'No Status'
    )
    tickets.append({
        'number': content['number'],
        'title': content['title'],
        'url': content['url'],
        'repo': content['repository']['name'],
        'labels': labels,
        'status': status,
    })
print(json.dumps({'tickets': tickets, 'updatedAt': __import__('datetime').datetime.utcnow().isoformat() + 'Z'}))
" > data.json

          echo "DEBUG tickets saved: $(python3 -c "import json; print(len(json.load(open('data.json'))['tickets']))")"

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update dashboard data [skip ci]"
          git push
