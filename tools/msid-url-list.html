<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MSID & URL List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 24px;
    }

    .container {
      width: 100%;
      max-width: 900px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 28px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e2130;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    thead tr {
      background: #262a3a;
    }

    th {
      text-align: left;
      padding: 14px 20px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
    }

    tbody tr {
      border-top: 1px solid #2a2f42;
      transition: background 0.15s;
    }

    tbody tr:hover {
      background: #252a3d;
    }

    td {
      padding: 14px 20px;
      font-size: 0.85rem;
      vertical-align: middle;
    }

    td.msid {
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 0.78rem;
      color: #94a3b8;
      width: 40%;
    }

    td.url a {
      color: #60a5fa;
      text-decoration: none;
    }

    td.url a:hover {
      text-decoration: underline;
      color: #93c5fd;
    }

    td.action {
      text-align: right;
      width: 110px;
    }

    .copy-btn {
      background: #2d3348;
      border: 1px solid #3a4060;
      color: #94a3b8;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: #3a4060;
      color: #e2e8f0;
      border-color: #4a5280;
    }

    .copy-btn.copied {
      background: #14532d;
      border-color: #166534;
      color: #4ade80;
    }

    .copy-all-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .copy-all-btn {
      background: #1d4ed8;
      border: none;
      color: #fff;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 0.83rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .copy-all-btn:hover {
      background: #2563eb;
    }

    .copy-all-btn.copied {
      background: #166534;
      color: #4ade80;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MSID &amp; URL List</h1>
    <p class="subtitle">10 entries — click Copy to copy a row to clipboard</p>

    <table>
      <thead>
        <tr>
          <th>MSID</th>
          <th>URL</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div class="copy-all-row">
      <button class="copy-all-btn" onclick="copyAll(this)">Copy All</button>
    </div>
  </div>

  <script>
    const data = [
      { msid: "ddaf13f3-6eaa-4b92-abec-47fea6054a2d", url: "https://blacktoonurl2.com" },
      { msid: "aa74ee09-d226-450d-95bc-8c7ef85927c2", url: "https://ronyohananov.com" },
      { msid: "c480011a-a674-4e67-85e2-2a6d79999252", url: "https://testpapers.co.za" },
      { msid: "bcb9d044-190b-4a21-b7e1-fde586f49eca", url: "https://pucara.org" },
      { msid: "6bea288c-6f87-4c87-bc8c-497cf387f076", url: "https://debelegger.nl" },
      { msid: "edc63b9d-7d01-481c-8cfe-0dab125a0dd7", url: "https://motosbajaj.com.mx" },
      { msid: "1731f2a8-f5c0-4b65-ba31-1e06bd39bc91", url: "https://hi-precision.com.ph" },
      { msid: "4c2f70b2-1bf5-4ced-ba14-9a2cb9ba5ef6", url: "https://kingstore-sale.com" },
      { msid: "a41fe717-164d-424a-9ac1-32c8d83827b9", url: "https://solucionesdigitales.promerica.com.sv" },
      { msid: "d2bf7409-1646-4629-9f06-1b1be189fb71", url: "https://thebyan.com" },
    ];

    const tbody = document.getElementById("tableBody");

    data.forEach((row, i) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="msid">${row.msid}</td>
        <td class="url"><a href="${row.url}" target="_blank">${row.url}</a></td>
        <td class="action">
          <button class="copy-btn" onclick="copyRow(this, ${i})">Copy</button>
        </td>
      `;
      tbody.appendChild(tr);
    });

    function copyRow(btn, index) {
      const row = data[index];
      const text = `${row.msid}\t${row.url}`;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "Copy";
          btn.classList.remove("copied");
        }, 1800);
      });
    }

    function copyAll(btn) {
      const text = data.map(r => `${r.msid}\t${r.url}`).join("\n");
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = "Copied All!";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "Copy All";
          btn.classList.remove("copied");
        }, 1800);
      });
    }
  </script>
</body>
</html>
